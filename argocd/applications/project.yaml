apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: microservices-project
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Microservices Demo Project
  
  # Source repositories
  sourceRepos:
    - 'https://github.com/Pramothsgp/*'
    - 'https://github.com/argoproj/argo-cd.git'  # For Argo CD resources
  
  # Destination clusters and namespaces
  destinations:
    - namespace: microservices-demo
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  
  # Allowed cluster resources
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: 'networking.k8s.io'
      kind: Ingress
  
  # Allowed namespace resources
  namespaceResourceWhitelist:
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: ''
      kind: Service
    - group: apps
      kind: Deployment
    - group: networking.k8s.io
      kind: Ingress
  
  # Roles for the project
  roles:
    - name: developer
      description: Developer access to the project
      policies:
        - p, proj:microservices-project:developer, applications, get, microservices-project/*, allow
        - p, proj:microservices-project:developer, applications, sync, microservices-project/*, allow
      groups:
        - developers
    
    - name: admin
      description: Admin access to the project
      policies:
        - p, proj:microservices-project:admin, applications, *, microservices-project/*, allow
      groups:
        - admins
