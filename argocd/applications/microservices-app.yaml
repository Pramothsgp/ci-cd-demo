apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservices-demo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # ArgoCD Image Updater annotations - auto-detect new Docker Hub images
    argocd-image-updater.argoproj.io/image-list: |
      api-gateway=pramothsgp/api-gateway:~
      user-service=pramothsgp/user-service:~
      order-service=pramothsgp/order-service:~
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
    # Update strategy: use latest semver or commit SHA
    argocd-image-updater.argoproj.io/api-gateway.update-strategy: latest
    argocd-image-updater.argoproj.io/user-service.update-strategy: latest
    argocd-image-updater.argoproj.io/order-service.update-strategy: latest
spec:
  project: default
  
  source:
    repoURL: https://github.com/Pramothsgp/ci-cd-demo.git
    targetRevision: main
    path: k8s/overlays/dev
    
    # Use Kustomize for environment-specific configurations
    kustomize:
      # Images will be updated by kustomize edit set image in CI/CD pipeline
      images: []

  destination:
    server: https://kubernetes.default.svc
    namespace: microservices-demo

  syncPolicy:
    automated:
      prune: true        # Remove resources not in Git
      selfHeal: true     # Auto-sync when cluster state differs
      allowEmpty: false  # Don't sync if source is empty
    
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Health checks
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas  # Ignore replica count differences (for HPA)

  info:
    - name: Documentation
      value: https://github.com/YOUR_GITHUB_USERNAME/ci-cd-demo
    - name: Environment
      value: Development
