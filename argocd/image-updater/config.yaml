# =============================================================================
# ArgoCD Image Updater Configuration
# =============================================================================
# This ConfigMap configures ArgoCD Image Updater to automatically detect
# new Docker images and update the deployments
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-config
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater
    app.kubernetes.io/part-of: argocd-image-updater
data:
  # Check for new images every 2 minutes (for demo purposes)
  registries.conf: |
    registries:
      - name: Docker Hub
        api_url: https://registry-1.docker.io
        prefix: docker.io
        default: true
        # For public Docker Hub images, no credentials needed
        # For private images, configure a secret

  # Log level for debugging
  log.level: debug
