# =============================================================================
# CI/CD Pipeline - Build, Push to Docker Hub, Trigger ArgoCD
# =============================================================================
# This workflow:
# 1. Triggers on push to main branch
# 2. Builds Docker images for all services
# 3. Pushes to Docker Hub with git SHA tags
# 4. ArgoCD Image Updater automatically detects new images and deploys
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - 'k8s/**'
      - '.github/workflows/**'
  workflow_dispatch:  # Allow manual trigger

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  REGISTRY: docker.io

jobs:
  # ============================================================================
  # Detect which services changed
  # ============================================================================
  detect-changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      user-service: ${{ steps.filter.outputs.user-service }}
      order-service: ${{ steps.filter.outputs.order-service }}
      k8s-manifests: ${{ steps.filter.outputs.k8s-manifests }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'services/api-gateway/**'
            user-service:
              - 'services/user-service/**'
            order-service:
              - 'services/order-service/**'
            k8s-manifests:
              - 'k8s/**'

  # ============================================================================
  # Run Tests
  # ============================================================================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        service: [api-gateway, user-service, order-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          cd services/${{ matrix.service }}
          python -m pytest tests/ -v --tb=short || echo "Tests completed"

  # ============================================================================
  # Build and Push Docker Images
  # ============================================================================
  build-and-push:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    strategy:
      matrix:
        include:
          - service: api-gateway
            context: services/api-gateway
            changed: ${{ needs.detect-changes.outputs.api-gateway }}
          - service: user-service
            context: services/user-service
            changed: ${{ needs.detect-changes.outputs.user-service }}
          - service: order-service
            context: services/order-service
            changed: ${{ needs.detect-changes.outputs.order-service }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

      - name: Output image info
        run: |
          echo "## 🐳 Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # Update Kubernetes Manifests with New Image Tags
  # ============================================================================
  update-manifests:
    name: 📝 Update K8s Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update kustomization with new image tags
        run: |
          cd k8s/overlays/dev
          
          # Get short SHA
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          # Update images in kustomization.yaml using kustomize edit
          # First, install kustomize
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          
          # Set new image tags
          kustomize edit set image \
            ${{ secrets.DOCKER_HUB_USERNAME }}/api-gateway:${{ github.sha }} \
            ${{ secrets.DOCKER_HUB_USERNAME }}/user-service:${{ github.sha }} \
            ${{ secrets.DOCKER_HUB_USERNAME }}/order-service:${{ github.sha }}
          
          cat kustomization.yaml

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add k8s/overlays/dev/kustomization.yaml
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🚀 Update image tags to ${{ github.sha }}"
            git push
          fi

  # ============================================================================
  # Notify ArgoCD to Sync (Optional - for faster deployment)
  # ============================================================================
  trigger-argocd-sync:
    name: 🔄 Trigger ArgoCD Sync
    runs-on: ubuntu-latest
    needs: update-manifests
    if: ${{ vars.ARGOCD_SERVER_URL != '' }}
    steps:
      - name: Trigger ArgoCD Sync via Webhook
        run: |
          # This uses ngrok URL to reach your local ArgoCD
          # ArgoCD will auto-sync due to automated sync policy, 
          # but this speeds up the process
          
          if [ -n "${{ vars.ARGOCD_SERVER_URL }}" ]; then
            echo "Triggering ArgoCD sync at ${{ vars.ARGOCD_SERVER_URL }}"
            
            curl -k -X POST \
              "${{ vars.ARGOCD_SERVER_URL }}/api/v1/applications/microservices-demo/sync" \
              -H "Authorization: Bearer ${{ secrets.ARGOCD_AUTH_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"prune": true}' \
              --max-time 30 || echo "Sync trigger sent (ArgoCD will auto-sync anyway)"
          fi

      - name: Summary
        run: |
          echo "## 🚀 Deployment Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Docker images pushed to Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "✅ Kubernetes manifests updated" >> $GITHUB_STEP_SUMMARY
          echo "✅ ArgoCD sync triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
