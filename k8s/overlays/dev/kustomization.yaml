apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: microservices-demo

resources:
  - ../../base

# Development-specific patches
patches:
  # Reduce replicas for dev environment
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: api-gateway
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: user-service
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: order-service
  
  # Reduce resource limits for dev
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "64Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "50m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "100m"
    target:
      kind: Deployment

configMapGenerator:
  - name: microservices-config
    behavior: merge
    literals:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG

labels:
  - pairs:
      environment: dev

images:
  - name: pramothsgp/api-gateway
    newTag: 45752f5a5d8d65da789621a9a0d5c781aa0490e8
  - name: pramothsgp/user-service
    newTag: 45752f5a5d8d65da789621a9a0d5c781aa0490e8
  - name: pramothsgp/order-service
    newTag: 45752f5a5d8d65da789621a9a0d5c781aa0490e8

# ============================================================================
# Image configuration - Updated by GitHub Actions CI/CD pipeline
# The newTag will be updated automatically when you push to main branch
# Format: kustomize edit set image pramothsgp/api-gateway:NEW_SHA
# ============================================================================
images:
  - name: pramothsgp/api-gateway
    newTag: 45752f5a5d8d65da789621a9a0d5c781aa0490e8
  - name: pramothsgp/user-service
    newTag: 45752f5a5d8d65da789621a9a0d5c781aa0490e8
  - name: pramothsgp/order-service
    newTag: 45752f5a5d8d65da789621a9a0d5c781aa0490e8
