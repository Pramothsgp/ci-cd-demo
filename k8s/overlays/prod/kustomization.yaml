apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: microservices-demo

resources:
  - ../../base

# Production-specific patches
patches:
  # Increase replicas for production (load balancing)
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: api-gateway
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: user-service
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: order-service
  
  # Increase resource limits for production
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
    target:
      kind: Deployment

  # Add pod disruption budgets for high availability
  - patch: |-
      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app: api-gateway
    target:
      kind: Deployment
      name: api-gateway

configMapGenerator:
  - name: microservices-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO

labels:
  environment: prod

images:
  - name: ghcr.io/YOUR_GITHUB_USERNAME/api-gateway
    newTag: latest
  - name: ghcr.io/YOUR_GITHUB_USERNAME/user-service
    newTag: latest
  - name: ghcr.io/YOUR_GITHUB_USERNAME/order-service
    newTag: latest
