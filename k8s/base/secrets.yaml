apiVersion: v1
kind: Secret
metadata:
  name: microservices-secrets
  labels:
    app: microservices-demo
type: Opaque
data:
  # Base64 encoded values (for demo purposes)
  # In production, use external secrets management (Vault, AWS Secrets Manager, etc.)
  
  # Example: echo -n 'your-secret-key' | base64
  API_KEY: ZGVtby1hcGkta2V5LTEyMzQ1  # demo-api-key-12345
  JWT_SECRET: ZGVtby1qd3Qtc2VjcmV0LWtleQ==  # demo-jwt-secret-key
  
  # Database credentials (example - not used in this demo)
  DB_PASSWORD: ZGVtby1kYi1wYXNzd29yZA==  # demo-db-password
